{{- if .Values.controlplane.tlsRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: "{{ .Release.Namespace }}"
spec:
  hostnames:
    # - "{{ .Release.Namespace }}.localhost"
    - "{{ .Release.Namespace }}.{{ .Values.controlplane.domainSuffix }}"
  parentRefs:
    - name: {{ .Values.controlplane.tlsRoute.gatewayName }}
      namespace: {{ .Values.controlplane.tlsRoute.gatewayNamespace }}
  rules:
    - backendRefs:
        - name: kube-apiserver
          kind: Service
          namespace: "{{ .Release.Namespace }}"
          port: 6443
{{- end }}
