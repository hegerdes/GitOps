apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
spec:
  project: default
  sources:
    - chart: gateway-helm
      repoURL: docker.io/envoyproxy
      targetRevision: 1.7.1
      helm:
        releaseName: eg
        skipCrds: true
        valuesObject:
          crds:
            gatewayAPI:
              enabled: false
    - repoURL: https://github.com/envoyproxy/gateway.git
      targetRevision: HEAD
      path: charts/gateway-helm/charts/crds/crds/generated/
      directory:
        recurse: false
    - repoURL: https://github.com/hegerdes/GitOps.git
      targetRevision: HEAD
      path: k8s-cluster-hcloud-critical/envoy-gateway
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway
  info:
    - name: Chart-Info
      value: https://github.com/envoyproxy/gateway/blob/main/charts/gateway-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
